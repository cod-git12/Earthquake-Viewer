<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="SEISMO — REQUEST STATUS | SEISMO | 5kaideta.cfd">
    <meta property="og:site_name" content="SEISMO — リクエストステータス">
    <meta property="og:description" content="リアルタイム地震情報を地図上に可視化。GitHub Pages版よりも高速で安定した環境を提供します。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://earthquake.5kaideta.cfd/status">
    <meta property="og:image" content="https://earthquake.5kaideta.cfd/ogp-thumbnail.png">
    <meta property="twitter:card" content="summary_large_image">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>SEISMO — REQUEST STATUS | earthquake.5kaideta.cfd</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030507;
            --accent: #00f2ff;
            --bg-card: #0b0f18;
            --border: #161c28;
            --text: #e2e8f0;
            --cyan-dim: rgba(0, 216, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            margin: 0;
            padding: 40px 5%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        h1 {
            font-family: 'Share Tech Mono';
            color: var(--accent);
            margin: 0;
            font-size: 1.5rem;
        }

        .hdr-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .filter-select {
            background: var(--bg-card);
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 5px 10px;
            font-family: 'Share Tech Mono';
            outline: none;
            cursor: pointer;
            border-radius: 4px;
        }

        /* 言語切り替えトグル */
        .lang-switch {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 216, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: #475569;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .lang-btn:hover {
            color: var(--text);
        }

        .lang-btn.active {
            background: var(--cyan-dim);
            color: var(--accent);
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .item:hover {
            border-color: var(--accent);
        }

        .point-name {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--text);
        }

        .point-info {
            font-family: 'Share Tech Mono';
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .badge {
            font-family: 'Share Tech Mono';
            padding: 5px 12px;
            border-radius: 2px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .PENDING {
            color: #f59e0b;
            border: 1px solid #f59e0b;
        }

        .RESOLVED {
            color: #10b981;
            border: 1px solid #10b981;
            opacity: 0.6;
        }

        #loading {
            text-align: center;
            font-family: 'Share Tech Mono';
            color: var(--accent);
            margin-top: 50px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 40px;
            color: #475569;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text);
        }
    </style>
</head>

<body>

    <div class="header">
        <h1 data-i18n="title">Request Status</h1>
        <div class="hdr-right">
            <select id="statusFilter" class="filter-select" onchange="renderList()">
                <option value="ALL" data-i18n="optAll">All</option>
                <option value="PENDING" data-i18n="optPen">Pending</option>
                <option value="RESOLVED" data-i18n="optRes">Resolved</option>
            </select>
            <div class="lang-switch">
                <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
                <button class="lang-btn" onclick="setLang('ja')" id="btn-ja">JA</button>
            </div>
        </div>
    </div>

    <div id="loading" data-i18n="loading">Initializing...</div>
    <div class="list" id="reqList"></div>

    <a href="/" class="back-link" data-i18n="retMonitor">← Return to Monitor</a>

    <script>
        const i18n = {
            ja: {
                title: "リクエスト進捗状況",
                desc: "ユーザーの皆様から送信された未登録地点リクエストの処理状況一覧です。ステータスが「RESOLVED」になった地点は、次回のマップ更新時、またはリアルタイムにデータが反映されるようになります。",
                filterAll: "すべてのステータス",
                filterPending: "保留中 (PENDING)",
                filterApproved: "対応完了 (RESOLVED)",
                noData: "該当するリクエストはありません。"
            },
            en: {
                title: "Request Processing Status",
                desc: "This is a list of the processing status of unregistered location requests submitted by users. Locations with a status of \"RESOLVED\" will be reflected in the next map update or in real-time.",
                filterAll: "All Statuses",
                filterPending: "Pending",
                filterApproved: "Resolved",
                noData: "No requests found matching the criteria."
            }
        };

        let currentLang = localStorage.getItem('lang') || (navigator.language.startsWith('ja') ? 'ja' : 'en');

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
            });

            const filter = document.getElementById('statusFilter');
            filter.options[0].text = i18n[lang].filterAll;
            filter.options[1].text = i18n[lang].filterPending;
            filter.options[2].text = i18n[lang].filterApproved;

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick').includes(lang));
            });

            if (allRequests.length > 0) renderList();
        }

        const SB_URL = "https://ntuwycxlznihjnlxlkrg.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50dXd5Y3hsem5paGpubHhsa3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDcwNDEsImV4cCI6MjA5Mzk4MzA0MX0.l3XKWmY2WmBm1o8hejSbBd2RaGws-rXUgUB7wtfRnaQ";

        let allRequests = [];

        async function fetchRequests() {
            try {
                const res = await fetch(`${SB_URL}/rest/v1/requests`, {
                    headers: {
                        'apikey': SB_KEY,
                        'Authorization': `Bearer ${SB_KEY}`
                    }
                });

                if (!res.ok) {
                    throw new Error('データ取得失敗');
                }

                allRequests = await res.json();
                renderList();
            } catch (err) {
                console.error(err);
                document.getElementById('reqList').innerHTML = `<div style="text-align:center; color:#ef4444; font-family:'Share Tech Mono',monospace;">Error loading live data from Supabase.</div>`;
            }
        }

        function renderList() {
            const listEl = document.getElementById('reqList');
            const filterValue = document.getElementById('statusFilter').value;

            let filtered = allRequests.filter(item => {
                if (filterValue === 'ALL') return true;
                if (filterValue === 'RESOLVED') return item.status === 'approved';
                if (filterValue === 'PENDING') return item.status === 'pending';
                return true;
            });

            filtered.sort((a, b) => {
                const dateA = new Date(a.created_at || 0);
                const dateB = new Date(b.created_at || 0);
                return dateB - dateA;
            });

            if (filtered.length === 0) {
                listEl.innerHTML = `<div style="text-align:center; color:#475569;">${i18n[currentLang].noData}</div>`;
                return;
            }

            listEl.innerHTML = filtered.map(item => {
                const isApproved = item.status === 'approved';
                const statusText = isApproved ? 'RESOLVED' : 'PENDING';
                const badgeClass = isApproved ? 'RESOLVED' : 'PENDING';
                const itemBgStyle = isApproved ? 'background: #070a10;' : '';

                return `
                    <div class="item" style="${itemBgStyle}">
                        <div>
                            <div class="point-name">${esc(item.name)}</div>
                            <div class="point-info">${esc(item.note)} | ID: #${(item.id || 0).toString().padStart(4, '0')}</div>
                        </div>
                        <span class="badge ${badgeClass}">${statusText}</span>
                    </div>
                `;
            }).join('');
        }

        function esc(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        setLang(currentLang);
        window.onload = fetchRequests;
    </script>

</body>

</html>
