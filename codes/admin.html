<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="SEISMO — ADMIN DASHBOARD | SEISMO | 5kaideta.cfd">
    <meta property="og:site_name" content="SEISMO — アドミンダッシュボード">
    <meta property="og:description" content="リアルタイム地震情報を地図上に可視化。GitHub Pages版よりも高速で安定した環境を提供します。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://earthquake.5kaideta.cfd/admin">
    <meta property="og:image" content="https://earthquake.5kaideta.cfd/ogp-thumbnail.png">
    <meta property="twitter:card" content="summary_large_image">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>SEISMO — ADMIN DASHBOARD | SEISMO | 5kaideta.cfd</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030507;
            --accent: #00f2ff;
            --bg-card: #0b0f18;
            --border: #161c28;
            --text: #e2e8f0;
            --cyan-dim: rgba(0, 216, 255, 0.08);
            --badge-pending: rgba(234, 179, 8, 0.15);
            --badge-pending-text: #eab308;
            --badge-approved: rgba(16, 185, 129, 0.15);
            --badge-approved-text: #10b981;
            --danger: #ef4444;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent);
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ログインボックスのスタイル調整 */
        #login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 6px;
            max-width: 400px;
            margin: 100px auto 0 auto;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #login-box h2 {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent);
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 2px;
            font-size: 1.4rem;
        }

        #login-box input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 4px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            margin-bottom: 15px;
            box-sizing: border-box;
            transition: 0.2s;
        }

        #login-box input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 8px rgba(0, 242, 255, 0.2);
        }

        #login-box button {
            width: 100%;
            background: var(--cyan-dim);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        #login-box button:hover {
            background: var(--accent);
            color: #000;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .btn-logout:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .hidden {
            display: none !important;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        th,
        td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        th {
            font-family: 'Share Tech Mono', monospace;
            background: rgba(0, 216, 255, 0.02);
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.01);
        }

        .json-data {
            font-family: 'Share Tech Mono', monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid rgba(22, 28, 40, 0.7);
            max-width: 400px;
            white-space: nowrap;
            overflow-x: auto;
            text-overflow: ellipsis;
            color: #cbd5e1;
        }

        .badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            transition: 0.2s;
        }

        .badge:hover {
            transform: translateY(-1px);
            filter: brightness(1.2);
        }

        .badge-pending {
            background: var(--badge-pending);
            color: var(--badge-pending-text);
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .badge-approved {
            background: var(--badge-approved);
            color: var(--badge-approved-text);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="login-box">
            <h2>ADMIN LOGIN</h2>
            <form onsubmit="handleLogin(event)">
                <input type="email" id="admin-email" placeholder="ENTER ADMIN EMAIL" required>
                <input type="password" id="admin-pass" placeholder="ENTER PASSWORD" required>
                <button type="submit">LOGIN</button>
            </form>
        </div>

        <div id="admin-content" class="hidden">
            <div class="header">
                <h1>SEISMO — Request Dashboard</h1>
                <button class="btn-logout" onclick="handleLogout()">LOGOUT</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th>Request Data (JSON)</th>
                        <th style="width: 120px;">Status</th>
                        <th style="width: 180px;">Created At</th>
                        <th style="width: 100px;">Action</th>
                    </tr>
                </thead>
                <tbody id="request-tbody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SB_URL = "https://ntuwycxlznihjnlxlkrg.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50dXd5Y3hsem5paGpubHhsa3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDcwNDEsImV4cCI6MjA5Mzk4MzA0MX0.l3XKWmY2WmBm1o8hejSbBd2RaGws-rXUgUB7wtfRnaQ";

        window.addEventListener('DOMContentLoaded', async () => {
            const session = await getSession();
            if (session) {
                showAdminContent();
            } else {
                showLoginBox();
            }
        });

        async function getSession() {
            const token = localStorage.getItem('sb-access-token');
            if (!token) return null;

            try {
                const res = await fetch(`${SB_URL}/auth/v1/user`, {
                    headers: {
                        'apikey': SB_KEY,
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (res.ok) {
                    return await res.json();
                }
                localStorage.removeItem('sb-access-token');
                return null;
            } catch (e) {
                return null;
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-pass').value;

            try {
                const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SB_KEY
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(`ログイン失敗: ${data.error_description || data.message || '認証エラー'}`);
                    return;
                }

                localStorage.setItem('sb-access-token', data.access_token);
                showAdminContent();
            } catch (err) {
                alert('通信エラーが発生しました');
                console.error(err);
            }
        }

        function handleLogout() {
            localStorage.removeItem('sb-access-token');
            showLoginBox();
        }

        function getAuthHeaders() {
            return {
                'apikey': SB_KEY,
                'Authorization': `Bearer ${localStorage.getItem('sb-access-token')}`
            };
        }

        function showAdminContent() {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            fetchRequests();
        }

        function showLoginBox() {
            document.getElementById('login-box').classList.remove('hidden');
            document.getElementById('admin-content').classList.add('hidden');
            document.getElementById('admin-email').value = '';
            document.getElementById('admin-pass').value = '';
        }

        async function fetchRequests() {
            try {
                const res = await fetch(`${SB_URL}/rest/v1/requests?order=created_at.desc`, {
                    headers: getAuthHeaders()
                });

                if (res.status === 401 || res.status === 403) {
                    alert('セッションが切れました。再度ログインしてください。');
                    handleLogout();
                    return;
                }

                const data = await res.json();

                if (!Array.isArray(data)) {
                    console.error("Supabase Return Data Error:", data);
                    alert(`データ取得エラーが発生しました。\n\n【原因】\n${data.message || 'ポリシー（RLS）によって通信が遮断されています。Supabase側で古いfalseのポリシーが削除されているか確認してください。'}`);
                    return;
                }

                renderTable(data);
            } catch (err) {
                console.error(err);
                alert('データ取得中に例外エラーが発生しました');
            }
        }

        async function updateStatus(id, currentStatus) {
            const newStatus = currentStatus === 'pending' ? 'approved' : 'pending';
            if (!confirm(`ID: ${id} のステータスを ${newStatus} に変更しますか？`)) return;

            try {
                const res = await fetch(`${SB_URL}/rest/v1/requests?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: {
                        ...getAuthHeaders(),
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                if (!res.ok) {
                    alert('更新に失敗しました。権限がないか、セッションが切れています。');
                    return;
                }

                fetchRequests();
            } catch (err) {
                alert('更新エラーが発生しました');
                console.error(err);
            }
        }

        async function deleteRequest(id) {
            if (!confirm('本当にこのリクエストを削除しますか？（復元不可）')) return;

            try {
                const res = await fetch(`${SB_URL}/rest/v1/requests?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });

                if (!res.ok) {
                    alert('削除に失敗しました。権限がないか、セッションが切れています。');
                    return;
                }

                fetchRequests();
            } catch (err) {
                alert('削除エラーが発生しました');
                console.error(err);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('request-tbody');
            tbody.innerHTML = '';

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#64748b;">リクエストはありません</td></tr>';
                return;
            }

            data.forEach(req => {
                const tr = document.createElement('tr');
                const date = new Date(req.created_at).toLocaleString('ja-JP');

                let badgeClass = 'badge-pending';
                let badgeText = '保留中';
                if (req.status === 'approved') {
                    badgeClass = 'badge-approved';
                    badgeText = '承認済';
                }

                tr.innerHTML = `
                    <td>${req.id}</td>
                    <td><div class="json-data">${esc(req.name)}</div></td>
                    <td><span class="badge ${badgeClass}" onclick="updateStatus(${req.id}, '${req.status}')">${badgeText}</span></td>
                    <td>${date}</td>
                    <td><button class="btn-delete" onclick="deleteRequest(${req.id})">削除</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function esc(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</body>

</html>
