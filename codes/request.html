<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="SEISMO — REQUEST POINT | SEISMO | 5kaideta.cfd">
    <meta property="og:site_name" content="SEISMO — リクエストポイント">
    <meta property="og:description" content="リアルタイム地震情報を地図上に可視化。GitHub Pages版よりも高速で安定した環境を提供します。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://earthquake.5kaideta.cfd/request">
    <meta property="og:image" content="https://earthquake.5kaideta.cfd/ogp-thumbnail.png">
    <meta property="twitter:card" content="summary_large_image">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>SEISMO — REQUEST POINT | SEISMO | 5kaideta.cfd</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030507;
            --accent: #00f2ff;
            --bg-card: #0b0f18;
            --border: #161c28;
            --text: #e2e8f0;
            --cyan-dim: rgba(0, 216, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: inline-flex;
            align-items: center;
            background: rgba(0, 216, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: #475569;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .lang-btn:hover {
            color: var(--text);
        }

        .lang-btn.active {
            background: var(--cyan-dim);
            color: var(--accent);
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent);
            font-size: 1.5rem;
            margin: 0 0 20px 0;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 5px;
            font-family: 'Share Tech Mono';
        }

        input,
        textarea {
            width: 100%;
            background: #030507;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 4px;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--accent);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            font-family: 'Share Tech Mono';
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: var(--accent);
            color: black;
            font-weight: bold;
        }

        .back-link,
        .status-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #475569;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .back-link:hover,
        .status-link:hover {
            color: var(--text);
        }

        #message {
            margin-top: 15px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>
    <div class="lang-switch">
        <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
        <button class="lang-btn" onclick="setLang('ja')" id="btn-ja">JA</button>
    </div>

    <div class="container">
        <h1 data-i18n="title">Request New Point</h1>
        <form id="reqForm">
            <div class="form-group">
                <label data-i18n="argLabel">Argument (Array Log)</label>
                <input type="text" id="name" data-i18n-ph="argPh" placeholder="e.g., ['Pref', 'City', ...]" required>
            </div>
            <div class="form-group">
                <label data-i18n="noteLabel">Earthquake Info</label>
                <textarea id="note" rows="4" data-i18n-ph="notePh" placeholder="e.g., M3.0 earthquake at 1/1 0:50:00"
                    required></textarea>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn" data-i18n="submitBtn">Submit Request</button>
            <div id="message"></div>
        </form>
        <a href="/" class="back-link" data-i18n="retMonitor">← Return to Monitor</a>
        <a href="/status" class="status-link" data-i18n="lookStatus">← Look to Status</a>
    </div>

    <script>
        const i18n = {
            ja: {
                title: "未登録地点リクエストフォーム",
                desc: "マップ上にマーカーが表示されない、または震度分布が正しく反映されない未登録の地域がある場合は、こちらからリクエストを送信してください。",
                labelName: "地点名（必須）",
                labelNote: "補足情報（任意）",
                placeholderName: "例: 東京都千代田区麹町、岩手県宮古市茂市（コンソールに出るものをそのまま、震源地英訳未登録の場合は震源地名）",
                placeholderNote: "送信内容の震源地名や、マグニチュード、発生時間を詳しく記載していただけると助かります。",
                submitBtn: "リクエストを送信",
                sending: "送信中...",
                success: "リクエストを送信しました。管理者が確認・承認するまでしばらくお待ちください。",
                error: "送信に失敗しました。時間をおいて再度お試しください。"
            },
            en: {
                title: "Unregistered Location Request Form",
                desc: "If there are unregistered locations where markers do not appear on the map or intensity distribution is not reflected correctly, please submit a request here.",
                labelName: "Location Name (Required)",
                labelNote: "Additional Info (Optional)",
                placeholderName: "Example: Kojimachi, Chiyoda Ward, Tokyo; Moichi, Miyako City, Iwate Prefecture (Enter exactly as displayed on the console; if the epicenter name has not been registered in English, use the name of the epicenter)",
                placeholderNote: "It would be helpful if you could provide detailed information on the epicenter, magnitude, and time of the earthquake.",
                submitBtn: "Submit Request",
                sending: "Sending...",
                success: "Request submitted successfully. Please wait until the administrator reviews and approves it.",
                error: "Failed to send. Please try again later."
            }
        };

        let currentLang = localStorage.getItem('lang') || (navigator.language.startsWith('ja') ? 'ja' : 'en');

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
            });

            document.getElementById('name').placeholder = i18n[lang].placeholderName;
            document.getElementById('note').placeholder = i18n[lang].placeholderNote;
            document.getElementById('submitBtn').innerText = i18n[lang].submitBtn;

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick').includes(lang));
            });
        }

        const SB_URL = "https://ntuwycxlznihjnlxlkrg.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50dXd5Y3hsem5paGpubHhsa3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDcwNDEsImV4cCI6MjA5Mzk4MzA0MX0.l3XKWmY2WmBm1o8hejSbBd2RaGws-rXUgUB7wtfRnaQ";

        document.getElementById('reqForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            btn.disabled = true;
            btn.innerText = i18n[currentLang].sending;

            const data = {
                name: document.getElementById('name').value,
                note: document.getElementById('note').value,
                status: "pending"
            };

            try {
                const res = await fetch(`${SB_URL}/rest/v1/requests`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SB_KEY,
                        'Authorization': `Bearer ${SB_KEY}`,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    msg.style.display = 'block';
                    msg.style.color = '#10b981';
                    msg.innerText = i18n[currentLang].success;
                    document.getElementById('reqForm').reset();
                } else {
                    throw new Error('Server Error');
                }
            } catch (err) {
                msg.style.display = 'block';
                msg.style.color = '#ef4444';
                msg.innerText = i18n[currentLang].error;
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = i18n[currentLang].submitBtn;
            }
        });

        setLang(currentLang);
    </script>

</body>

</html>
