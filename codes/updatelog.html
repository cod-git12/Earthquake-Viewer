<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="SEISMO — Update Log | 5kaideta.cfd">
    <meta property="og:site_name" content="SEISMO — Update Log">
    <meta property="og:description" content="SEISMOの更新履歴・アップデートログです。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://earthquake.5kaideta.cfd/updatelog">
    <meta property="og:image" content="https://earthquake.5kaideta.cfd/ogp-thumbnail.png">
    <meta property="twitter:card" content="summary_large_image">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>SEISMO — Update Log | 5kaideta.cfd</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030507;
            --accent: #00f2ff;
            --bg-card: #0b0f18;
            --border: #161c28;
            --text: #e2e8f0;
            --cyan-dim: rgba(0, 216, 255, 0.08);
            --badge-new: rgba(16, 185, 129, 0.15);
            --badge-new-text: #10b981;
            --badge-fix: rgba(239, 68, 68, 0.15);
            --badge-fix-text: #ef4444;
            --badge-imp: rgba(234, 179, 8, 0.15);
            --badge-imp-text: #eab308;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent);
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .lang-switch {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 216, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: #475569;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .lang-btn:hover {
            color: var(--text);
        }

        .lang-btn.active {
            background: var(--cyan-dim);
            color: var(--accent);
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .item:hover {
            border-color: rgba(0, 242, 255, 0.3);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border);
        }

        .version {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: bold;
        }

        .date {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: #64748b;
        }

        .changes {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .changes li {
            margin-bottom: 10px;
            font-size: 0.95rem;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.5;
        }

        .changes li:last-child {
            margin-bottom: 0;
        }

        .tag {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .tag.new {
            background: var(--badge-new);
            color: var(--badge-new-text);
        }

        .tag.fix {
            background: var(--badge-fix);
            color: var(--badge-fix-text);
        }

        .tag.imp {
            background: var(--badge-imp);
            color: var(--badge-imp-text);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 40px;
            color: #64748b;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

            <div id="lastUpdated"

            </div>
            <div class="lang-switch">
                <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
                <button class="lang-btn" onclick="setLang('ja')" id="btn-ja">JA</button>
            </div>
        </div>

        <div class="list" id="logList">
            <!-- ログはjsで生成 -->
        </div>

        <a href="/" class="back-link" data-i18n="retMonitor">← Return to Monitor</a>
    </div>

                    {

                version: "v1.0.1",
                date: "2026.04.23",
                changes: [
                    {
                        type: "fix",

                    }
                ]

            {
                version: "v1.0.0",
                date: "2026.04.23",
                changes: [
                    {
                        type: "new",
                        en: "Released SEISMO, the real-time earthquake monitor!",
                        ja: "リアルタイム地震モニター「SEISMO」をリリースしました！"
                    }
                ]
            }

        let currentLang = localStorage.getItem('seismo_lang') || (navigator.language.startsWith('ja') ? 'ja' : 'en');

        function renderLogs() {
            const list = document.getElementById('logList');
            list.innerHTML = '';

            updateLogs.forEach(log => {
                const item = document.createElement('div');
                item.className = 'item';

                let changesHtml = '';
                log.changes.forEach(c => {
                    const tagText = i18n[currentLang].tags[c.type];
                    let text = currentLang === 'ja' ? c.ja : c.en;

                    text = parseCustomLinks(text);

                    changesHtml += `<li><span class="tag ${c.type}">${tagText}</span><span>${text}</span></li>`;
                });

                item.innerHTML = `
                    <div class="item-header">
                        <div class="version">${log.version}</div>
                        <div class="date">${log.date}</div>
                    </div>
                    <ul class="changes">
                        ${changesHtml}
                    </ul>
                `;
                list.appendChild(item);
            });
        }

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('seismo_lang', lang);
            document.documentElement.lang = lang;

            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-ja').classList.toggle('active', lang === 'ja');

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerText = i18n[lang][key];
            });

            const latestDate = updateLogs[0].date.replace(/\./g, '/');
            document.getElementById('lastUpdated').innerText = i18n[lang].lastUp + latestDate;

            renderLogs();
        }

        function parseCustomLinks(text) {
            return text.replace(/<link\s+([^>]+)>(.*?)<\/link>/g, (match, key, content) => {
                const url = links[key.trim()];
                if (url) {
                    return `<a href="${url}" style="color: var(--accent); text-decoration: underline;">${content}</a>`;
                }
                return content;
            });
        }

        setLang(currentLang);

</body>

</html>
